[pytest]
# Pytest configuration for the Enterprise Data Lineage Platform

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Default test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external dependencies)
    slow: Slow running tests
    db: Tests requiring database access
    sql_parser: SQL parsing tests
    lineage: Lineage-related tests
    impact: Impact analysis tests
    search: Search functionality tests

# Test output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Coverage options (if using pytest-cov)
# addopts = --cov=backend --cov-report=html --cov-report=term-missing

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (seconds)
timeout = 300

# Number of workers for parallel execution (if using pytest-xdist)
# addopts = -n auto

# Ignore certain paths
norecursedirs = .git .venv venv __pycache__ *.egg dist build

# Test ordering (if using pytest-ordering)
# Can be used to run specific tests before others
