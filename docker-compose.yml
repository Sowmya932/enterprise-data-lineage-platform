version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lineage_platform
      POSTGRES_USER: lineage_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
